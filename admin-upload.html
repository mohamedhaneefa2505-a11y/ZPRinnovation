<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Camera Picture Upload - ZPR INNOVATION</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background: radial-gradient(circle at top left, rgba(255, 72, 255, 0.12), transparent 20%),
                radial-gradient(circle at bottom right, rgba(255, 160, 0, 0.14), transparent 18%),
                #06020c;
            color: #ffffff;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(96, 39, 163, 0.12) 100%);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        h1 {
            text-align: center;
            color: #f5f3ff;
            margin-bottom: 30px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
        }

        .upload-section {
            margin-bottom: 30px;
        }

        .upload-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .upload-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .upload-item label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #d8b4fe;
        }

        .upload-item input[type="file"] {
            width: 100%;
            padding: 8px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 5px;
            color: #ffffff;
        }

        .upload-item img {
            max-width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 5px;
            margin-top: 10px;
            display: none;
        }

        .buttons {
            text-align: center;
            margin-top: 30px;
        }

        button {
            background: linear-gradient(135deg, #7c3aed 0%, #9333ea 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            margin: 0 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
        }

        button:hover {
            background: linear-gradient(135deg, #d8b4fe 0%, #7c3aed 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
        }

        .note {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #000000;
            padding: 15px;
            border-radius: 10px;
            margin-top: 30px;
            text-align: center;
        }

        .note strong {
            color: #000000;
        }

        .status {
            text-align: center;
            margin-top: 20px;
            font-size: 18px;
        }

        .accepted {
            color: #28a745;
        }

        .pending {
            color: #ffc107;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Admin - Camera Picture Upload</h1>

        <div class="upload-section">
            <h2>Upload 6 Pictures of the Camera</h2>
            <div class="upload-grid">
                <div class="upload-item">
                    <label for="pic1">Picture 1:</label>
                    <input type="file" id="pic1" accept="image/*" onchange="previewImage(this, 'preview1')">
                    <img id="preview1" alt="Preview 1">
                </div>
                <div class="upload-item">
                    <label for="pic2">Picture 2:</label>
                    <input type="file" id="pic2" accept="image/*" onchange="previewImage(this, 'preview2')">
                    <img id="preview2" alt="Preview 2">
                </div>
                <div class="upload-item">
                    <label for="pic3">Picture 3:</label>
                    <input type="file" id="pic3" accept="image/*" onchange="previewImage(this, 'preview3')">
                    <img id="preview3" alt="Preview 3">
                </div>
                <div class="upload-item">
                    <label for="pic4">Picture 4:</label>
                    <input type="file" id="pic4" accept="image/*" onchange="previewImage(this, 'preview4')">
                    <img id="preview4" alt="Preview 4">
                </div>
                <div class="upload-item">
                    <label for="pic5">Picture 5:</label>
                    <input type="file" id="pic5" accept="image/*" onchange="previewImage(this, 'preview5')">
                    <img id="preview5" alt="Preview 5">
                </div>
                <div class="upload-item">
                    <label for="pic6">Picture 6:</label>
                    <input type="file" id="pic6" accept="image/*" onchange="previewImage(this, 'preview6')">
                    <img id="preview6" alt="Preview 6">
                </div>
            </div>
        </div>

        <div class="buttons">
            <button onclick="uploadPictures()">Upload Pictures</button>
        </div>

        <div id="status" class="status pending">Status: Pictures not uploaded yet</div>

        <div class="note">
            <p><strong>NOTE:</strong> Advance should be paid beforehand. If any part of the camera is damaged, the damaged amount will be deducted from the advanced amount.</p>
        </div>
    </div>

    <script>
        function previewImage(input, previewId) {
            const file = input.files[0];
            const preview = document.getElementById(previewId);
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            } else {
                preview.style.display = 'none';
            }
        }

        function uploadPictures() {
            // Check if all 6 pictures are selected
            const pics = ['pic1', 'pic2', 'pic3', 'pic4', 'pic5', 'pic6'];
            let allSelected = true;
            pics.forEach(id => {
                if (!document.getElementById(id).files[0]) {
                    allSelected = false;
                }
            });

            if (!allSelected) {
                alert('Please select all 6 pictures before uploading.');
                return;
            }

            // Convert all images to base64 and store in localStorage
            const pictureData = {};
            let loadedCount = 0;
            const totalPics = pics.length;

            pics.forEach((id, index) => {
                const file = document.getElementById(id).files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    pictureData[`pic${index + 1}`] = e.target.result;
                    loadedCount++;
                    if (loadedCount === totalPics) {
                        // All pictures loaded, save to localStorage
                        localStorage.setItem('cameraPictures', JSON.stringify(pictureData));
                        localStorage.setItem('picturesUploaded', 'true');
                        document.getElementById('status').innerHTML = 'Status: <span style="color: #28a745;">Pictures uploaded successfully! Customer can now view and accept them.</span>';
                        alert('Pictures uploaded successfully! Customer can now accept them.');
                    }
                };
                reader.readAsDataURL(file);
            });
        }
    </script>
</body>
</html>
